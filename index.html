<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CRUD Mahasiswa</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f4f6f9;
      }

      .container {
        width: 90%;
        max-width: 1000px;
        margin: 30px auto;
      }

      .card {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 3px 10px rgba(0, 0, 0, 0.1);
      }

      h2 {
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin-bottom: 10px;
        border: 1px solid #ddd;
        border-radius: 5px;
      }

      button {
        border: none;
        padding: 12px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

      .btn-login {
        background: #0d6efd;
        color: white;
      }

      .btn-save {
        background: #198754;
        color: white;
      }

      .btn-delete {
        background: #dc3545;
        color: white;
      }

      .btn-logout {
        background: #dc3545;
        color: white;
        float: right;
      }

      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }

      table th,
      table td {
        border: 1px solid #ddd;
        padding: 10px;
      }

      table th {
        background: #f1f1f1;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr auto;
        gap: 10px;
      }

      .hidden {
        display: none;
      }

      .message {
        padding: 10px;
        margin-bottom: 15px;
        border-radius: 5px;
      }

      .success {
        background: #d1e7dd;
        color: #0f5132;
      }

      .error {
        background: #f8d7da;
        color: #842029;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- LOGIN PAGE -->
      <div id="loginPage" class="card">
        <h2>Login Sistem</h2>

        <div id="loginMsg"></div>

        <input type="email" id="email" placeholder="Email" />

        <input type="password" id="password" placeholder="Password" />

        <button class="btn-login" onclick="login()">Login</button>
      </div>

      <!-- APP PAGE -->
      <div id="appPage" class="card hidden">
        <button class="btn-logout" onclick="logout()">Logout</button>

        <h2>Data Mahasiswa</h2>

        <div id="appMsg"></div>

        <div class="row">
          <input type="text" id="nama" placeholder="Nama" />

          <input type="text" id="nim" placeholder="NIM" />

          <input type="text" id="jurusan" placeholder="Jurusan" />

          <button class="btn-save" onclick="tambahData()">Simpan</button>
        </div>

        <table>
          <thead>
            <tr>
              <th>Nama</th>
              <th>NIM</th>
              <th>Jurusan</th>
              <th>Aksi</th>
            </tr>
          </thead>

          <tbody id="tbodyMahasiswa"></tbody>
        </table>
      </div>
    </div>

    <script>
      const API_URL = "http://127.0.0.1:8000";

      function showMessage(id, msg, type) {
        document.getElementById(id).innerHTML = `<div class="message ${type}">
        ${msg}
     </div>`;
      }

      function getToken() {
        return localStorage.getItem("token");
      }

      function logout() {
        localStorage.removeItem("token");

        location.reload();
      }

      window.onload = () => {
        const token = getToken();

        if (token) {
          document.getElementById("loginPage").classList.add("hidden");

          document.getElementById("appPage").classList.remove("hidden");

          loadData();
        }
      };

      async function login() {
        try {
          const email = document.getElementById("email").value;

          const password = document.getElementById("password").value;

          const response = await fetch(`${API_URL}/login`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              email,
              password,
            }),
          });

          const data = await response.json();

          if (response.ok) {
            localStorage.setItem("token", data.access_token);

            document.getElementById("loginPage").classList.add("hidden");

            document.getElementById("appPage").classList.remove("hidden");

            loadData();
          } else {
            showMessage("loginMsg", "Login gagal", "error");
          }
        } catch (err) {
          showMessage("loginMsg", err.message, "error");
        }
      }

      async function loadData() {
        try {
          const response = await fetch(`${API_URL}/mahasiswa`, {
            headers: {
              Authorization: `Bearer ${getToken()}`,
            },
          });

          const data = await response.json();

          const tbody = document.getElementById("tbodyMahasiswa");

          tbody.innerHTML = "";

          if (Array.isArray(data)) {
            data.forEach((item) => {
              tbody.innerHTML += `
                <tr>
                    <td>${item.nama}</td>
                    <td>${item.nim}</td>
                    <td>${item.jurusan}</td>
                    <td>
                        <button
                        class="btn-delete"
                        onclick="hapusData('${item.id}')">
                        Hapus
                        </button>
                    </td>
                </tr>`;
            });
          }
        } catch (err) {
          console.log(err);
        }
      }

      async function tambahData() {
        try {
          const response = await fetch(`${API_URL}/mahasiswa`, {
            method: "POST",

            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${getToken()}`,
            },

            body: JSON.stringify({
              nama: document.getElementById("nama").value,

              nim: document.getElementById("nim").value,

              jurusan: document.getElementById("jurusan").value,
            }),
          });

          const result = await response.json();

          if (response.ok) {
            showMessage("appMsg", "Data berhasil disimpan", "success");

            loadData();
          } else {
            showMessage("appMsg", JSON.stringify(result), "error");
          }
        } catch (err) {
          showMessage("appMsg", err.message, "error");
        }
      }

      async function hapusData(id) {
        await fetch(`${API_URL}/mahasiswa/${id}`, {
          method: "DELETE",
          headers: {
            Authorization: `Bearer ${getToken()}`,
          },
        });

        loadData();
      }
    </script>
  </body>
</html>
