<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Dashboard Mahasiswa</title>

    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background"></div>

    <div class="container">
      <!-- LOGIN -->
      <section id="loginPage" class="card login-card">
        <h1>🎓 Dashboard Mahasiswa</h1>
        <p class="subtitle">Silakan login untuk melanjutkan</p>

        <div id="loginMessage"></div>

        <form id="loginForm">
          <input type="email" id="email" placeholder="Email" required />

          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />

          <button type="submit" class="btn primary">Login</button>
        </form>
      </section>

      <!-- STATISTIK -->
      <div class="stats">
        <div class="stat-card">
          <h2 id="totalMahasiswa">0</h2>
          <p>Total Mahasiswa</p>
        </div>

        <div class="stat-card">
          <h2 id="totalJurusan">0</h2>
          <p>Total Jurusan</p>
        </div>

        <div class="stat-card">
          <h2 id="totalNim">0</h2>
          <p>Total NIM Terdaftar</p>
        </div>
      </div>

      <!-- DASHBOARD -->
      <section id="dashboardPage" class="card hidden">
        <div class="header">
          <div>
            <h2>Data Mahasiswa</h2>
            <span class="subtitle"> Kelola data mahasiswa dengan mudah </span>
          </div>

          <button id="logoutBtn" class="btn danger">Logout</button>
        </div>

        <div id="appMessage"></div>

        <form id="mahasiswaForm" class="form-grid">
          <input type="text" id="nama" placeholder="Nama Mahasiswa" required />

          <input type="text" id="nim" placeholder="NIM" required />

          <input type="text" id="jurusan" placeholder="Jurusan" required />

          <button type="submit" class="btn success">Simpan</button>
        </form>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Nama</th>
                <th>NIM</th>
                <th>Jurusan</th>
                <th>Aksi</th>
              </tr>
            </thead>

            <tbody id="mahasiswaTable"></tbody>
          </table>
        </div>
      </section>
    </div>

    <script src="app.js"></script>
  </body>
</html>
